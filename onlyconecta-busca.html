<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnlyConecta — Buscar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --blue:#00AFF0; --orange:#FF6C2F; --dark:#080C12; --dark2:#0F1520; --dark3:#162030; --dark4:#1C2A3A; --white:#F4F8FF; --gray:#8899AA; --green:#44CC88; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark); color:var(--white); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; }

  /* NAV */
  nav { padding:0 32px; height:56px; display:flex; align-items:center; justify-content:space-between; background:var(--dark2); border-bottom:1px solid rgba(255,255,255,0.06); position:sticky; top:0; z-index:50; }
  .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .logo-text { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; }
  .logo-text span:first-child { color:var(--blue); }
  .logo-text span:last-child { color:var(--orange); }
  .nav-right { display:flex; align-items:center; gap:12px; }
  .nav-link { color:var(--gray); text-decoration:none; font-size:14px; transition:color .2s; }
  .nav-link:hover { color:var(--white); }
  .nav-link.active { color:var(--white); font-weight:500; }
  .nav-dash { background:var(--orange); color:#fff; padding:7px 16px; border-radius:8px; font-size:13px; font-weight:600; text-decoration:none; }

  /* VIEW TOGGLE */
  .view-bar { background:var(--dark2); border-bottom:1px solid rgba(255,255,255,0.06); padding:12px 32px; display:flex; align-items:center; gap:8px; }
  .view-toggle { display:flex; background:var(--dark3); border-radius:10px; padding:3px; gap:3px; }
  .view-btn { padding:8px 18px; border-radius:8px; border:none; font-size:13px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; color:var(--gray); background:transparent; transition:all .2s; }
  .view-btn.active-model { background:var(--blue); color:#fff; }
  .view-btn.active-agency { background:var(--orange); color:#fff; }
  .view-count { margin-left:auto; font-size:13px; color:var(--gray); }

  /* LAYOUT */
  .search-layout { display:flex; flex:1; }

  /* SIDEBAR FILTERS */
  .filters-panel { width:260px; background:var(--dark2); border-right:1px solid rgba(255,255,255,0.06); padding:20px; flex-shrink:0; height:calc(100vh - 112px); overflow-y:auto; position:sticky; top:112px; }
  .filter-group { margin-bottom:24px; }
  .filter-label { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--gray); margin-bottom:10px; display:block; }
  .filter-search { width:100%; background:var(--dark3); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:11px 14px; color:var(--white); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color .2s; }
  .filter-search:focus { border-color:var(--blue); }
  .filter-search::placeholder { color:rgba(136,153,170,0.4); }

  .filter-tags { display:flex; flex-wrap:wrap; gap:6px; }
  .filter-tag { padding:6px 12px; border-radius:100px; border:1px solid rgba(255,255,255,0.1); font-size:12px; cursor:pointer; color:var(--gray); background:var(--dark3); transition:all .2s; }
  .filter-tag:hover { border-color:rgba(255,255,255,0.25); color:var(--white); }
  .filter-tag.active { background:rgba(0,175,240,0.15); border-color:var(--blue); color:var(--blue); }
  .filter-tag.active.orange { background:rgba(255,108,47,0.15); border-color:var(--orange); color:var(--orange); }

  .filter-radio { display:flex; flex-direction:column; gap:8px; }
  .radio-option { display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; color:var(--gray); padding:4px 0; }
  .radio-option input { accent-color:var(--orange); }
  .radio-option:hover { color:var(--white); }

  .filter-divider { height:1px; background:rgba(255,255,255,0.06); margin-bottom:20px; }

  .clear-btn { width:100%; background:transparent; border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:9px; color:var(--gray); font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer; transition:all .2s; }
  .clear-btn:hover { border-color:var(--red); color:#FF4444; }

  /* RESULTS */
  .results-panel { flex:1; padding:24px 28px; overflow-y:auto; }
  .results-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .results-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; }
  .sort-select { background:var(--dark3); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:8px 12px; color:var(--white); font-family:'DM Sans',sans-serif; font-size:13px; outline:none; }

  /* CARDS GRID */
  .cards-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:16px; }

  /* MODEL CARD */
  .model-card { background:var(--dark2); border:1px solid rgba(255,255,255,0.06); border-radius:16px; padding:20px; cursor:pointer; transition:all .25s; position:relative; overflow:hidden; }
  .model-card:hover { border-color:rgba(0,175,240,0.3); transform:translateY(-3px); box-shadow:0 12px 32px rgba(0,0,0,0.3); }
  .model-card::before { content:''; position:absolute; top:-40px; right:-40px; width:120px; height:120px; border-radius:50%; opacity:.06; }
  .model-card.blue-card::before { background:var(--blue); }
  .model-card.orange-card::before { background:var(--orange); }

  .card-header { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .card-avatar { width:48px; height:48px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .card-name { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; margin-bottom:3px; }
  .card-sub { font-size:12px; color:var(--gray); }

  .card-badges { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .badge { display:inline-flex; align-items:center; gap:3px; font-size:11px; font-weight:600; padding:3px 9px; border-radius:100px; }
  .badge-blue { background:rgba(0,175,240,0.15); color:var(--blue); }
  .badge-orange { background:rgba(255,108,47,0.15); color:var(--orange); }
  .badge-green { background:rgba(68,204,136,0.15); color:var(--green); }
  .badge-gray { background:rgba(136,153,170,0.12); color:var(--gray); }

  .card-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
  .card-stat { background:var(--dark3); border-radius:8px; padding:10px; text-align:center; }
  .card-stat-value { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; margin-bottom:2px; }
  .card-stat-label { font-size:10px; color:var(--gray); }

  .card-bio { font-size:13px; color:var(--gray); line-height:1.6; margin-bottom:16px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

  .card-footer { display:flex; gap:8px; }
  .btn-contact { flex:1; padding:10px; border-radius:10px; border:none; font-size:13px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .2s; }
  .btn-contact.primary { background:linear-gradient(135deg,var(--orange),#CC4400); color:#fff; }
  .btn-contact.primary:hover { opacity:.88; transform:translateY(-1px); }
  .btn-contact.secondary { background:rgba(0,175,240,0.1); color:var(--blue); border:1px solid rgba(0,175,240,0.2); }
  .btn-contact.secondary:hover { background:rgba(0,175,240,0.2); }

  .verified-stamp { position:absolute; top:12px; right:12px; background:rgba(68,204,136,0.15); border:1px solid rgba(68,204,136,0.3); color:var(--green); font-size:10px; font-weight:700; padding:3px 8px; border-radius:100px; }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:60px 20px; color:var(--gray); }
  .empty-state .icon { font-size:48px; margin-bottom:16px; }
  .empty-state h3 { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:var(--white); margin-bottom:8px; }

  /* SKELETON */
  .skeleton { animation:shimmer 1.5s infinite; background:linear-gradient(90deg,var(--dark3) 25%,var(--dark4) 50%,var(--dark3) 75%); background-size:200% 100%; border-radius:8px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* TOAST */
  .toast { position:fixed; bottom:24px; right:24px; background:var(--dark2); border:1px solid rgba(255,255,255,0.1); border-left:3px solid var(--green); border-radius:12px; padding:14px 20px; font-size:14px; z-index:300; transform:translateY(80px); opacity:0; transition:all .3s; pointer-events:none; }
  .toast.show { transform:translateY(0); opacity:1; }

  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:10px; }

  @media(max-width:768px) { .filters-panel{display:none;} nav{padding:0 16px;} .results-panel{padding:16px;} }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="28" height="28"><defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#00AFF0"/><stop offset="100%" style="stop-color:#FF6C2F"/></linearGradient></defs><circle cx="100" cy="90" r="72" fill="#0F1520"/><circle cx="100" cy="90" r="72" fill="none" stroke="url(#lg)" stroke-width="2" opacity="0.6"/><rect x="68" y="88" width="64" height="48" rx="10" fill="url(#lg)"/><path d="M80 88 L80 68 Q80 50 100 50 Q120 50 120 68 L120 88" fill="none" stroke="url(#lg)" stroke-width="9" stroke-linecap="round"/><circle cx="100" cy="108" r="9" fill="#0F1520"/><rect x="96" y="108" width="8" height="12" rx="3" fill="#0F1520"/></svg>
    <div class="logo-text"><span>Only</span><span>Conecta</span></div>
  </a>
  <div class="nav-right">
    <a href="onlyconecta-busca.html" class="nav-link active">🔍 Buscar</a>
    <a href="onlyconecta-dashboard.html" class="nav-link">Dashboard</a>
    <a href="onlyconecta-dashboard.html" class="nav-dash">Minha Conta</a>
  </div>
</nav>

<!-- VIEW TOGGLE -->
<div class="view-bar">
  <div class="view-toggle">
    <button class="view-btn active-agency" id="btnModels" onclick="setView('models')">👩 Buscar Modelos</button>
    <button class="view-btn" id="btnAgencies" onclick="setView('agencies')">🏢 Buscar Agências</button>
  </div>
  <span class="view-count" id="viewCount">247 modelos encontradas</span>
</div>

<div class="search-layout">

  <!-- FILTERS -->
  <aside class="filters-panel">
    <div class="filter-group">
      <span class="filter-label">Busca rápida</span>
      <input class="filter-search" type="text" placeholder="Nome, nicho..." id="searchInput" oninput="applyFilters()"/>
    </div>

    <div class="filter-divider"></div>

    <div class="filter-group" id="nicheFilter">
      <span class="filter-label">Nicho</span>
      <div class="filter-tags">
        <span class="filter-tag" onclick="toggleFilter(this,'niche','Fitness')">Fitness</span>
        <span class="filter-tag" onclick="toggleFilter(this,'niche','Lifestyle')">Lifestyle</span>
        <span class="filter-tag" onclick="toggleFilter(this,'niche','Gaming')">Gaming</span>
        <span class="filter-tag" onclick="toggleFilter(this,'niche','Moda')">Moda</span>
        <span class="filter-tag" onclick="toggleFilter(this,'niche','Arte')">Arte</span>
        <span class="filter-tag" onclick="toggleFilter(this,'niche','Música')">Música</span>
        <span class="filter-tag" onclick="toggleFilter(this,'niche','Culinária')">Culinária</span>
      </div>
    </div>

    <div class="filter-group">
      <span class="filter-label">Localização</span>
      <div class="filter-tags">
        <span class="filter-tag" onclick="toggleFilter(this,'location','São Paulo')">São Paulo</span>
        <span class="filter-tag" onclick="toggleFilter(this,'location','Rio de Janeiro')">Rio de Janeiro</span>
        <span class="filter-tag" onclick="toggleFilter(this,'location','Minas Gerais')">Minas Gerais</span>
        <span class="filter-tag" onclick="toggleFilter(this,'location','Outro')">Outro estado</span>
      </div>
    </div>

    <div class="filter-group">
      <span class="filter-label">Modalidade</span>
      <div class="filter-radio">
        <label class="radio-option"><input type="radio" name="modality" value="" onchange="applyFilters()"> Todas</label>
        <label class="radio-option"><input type="radio" name="modality" value="Presencial" onchange="applyFilters()"> 🏢 Presencial</label>
        <label class="radio-option"><input type="radio" name="modality" value="Híbrido" onchange="applyFilters()"> 🔀 Híbrido</label>
        <label class="radio-option"><input type="radio" name="modality" value="Home Office" onchange="applyFilters()"> 🏠 Home Office</label>
      </div>
    </div>

    <div class="filter-group" id="verifiedFilter">
      <span class="filter-label">Verificação</span>
      <div class="filter-tags">
        <span class="filter-tag" onclick="toggleFilter(this,'verified','true')">✓ Verificadas</span>
      </div>
    </div>

    <button class="clear-btn" onclick="clearFilters()">Limpar filtros</button>
  </aside>

  <!-- RESULTS -->
  <div class="results-panel">
    <div class="results-header">
      <span class="results-title" id="resultsTitle">Modelos disponíveis</span>
      <select class="sort-select" onchange="applyFilters()">
        <option value="recent">Mais recentes</option>
        <option value="rating">Melhor avaliação</option>
        <option value="followers">Mais seguidores</option>
      </select>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ─── DATA ────────────────────────────────────────────────
  const models = [
    { id:1, name:'Luna Silva',    avatar:'👩', bg:'rgba(0,175,240,.15)',   niche:['Fitness','Lifestyle'], location:'São Paulo',    modality:'Home Office', followers:'47k', revenue:'R$5k–10k', rating:4.8, bio:'Criadora de conteúdo fitness há 3 anos. Busco agência com foco em crescimento orgânico e gestão profissional.', verified:false },
    { id:2, name:'Camila R.',     avatar:'👱‍♀️', bg:'rgba(255,215,0,.15)',   niche:['Moda','Lifestyle'],  location:'Rio de Janeiro',modality:'Híbrido',     followers:'120k',revenue:'R$15k+',   rating:4.9, bio:'Modelo de moda e lifestyle com grande engajamento. Já trabalhei com 2 agências e busco parceria de longo prazo.', verified:false },
    { id:3, name:'Sofia M.',      avatar:'👸', bg:'rgba(68,204,136,.15)',   niche:['Arte','Música'],     location:'Minas Gerais', modality:'Home Office', followers:'22k', revenue:'R$2k–5k',   rating:4.5, bio:'Artista e musicista independente. Começo no OF há 6 meses e crescendo rápido. Quero uma agência parceira.', verified:false },
    { id:4, name:'Isabela C.',    avatar:'🌟', bg:'rgba(255,108,47,.15)',   niche:['Gaming'],           location:'São Paulo',    modality:'Home Office', followers:'85k', revenue:'R$8k–15k',  rating:4.7, bio:'Gamer e criadora de conteúdo tech. Nicho nichado com audiência muito engajada e fiel.', verified:false },
    { id:5, name:'Fernanda L.',   avatar:'💫', bg:'rgba(180,120,255,.15)', niche:['Fitness','Culinária'],location:'São Paulo',   modality:'Presencial',  followers:'31k', revenue:'R$3k–5k',   rating:4.6, bio:'Instrutora de pilates e nutricionista. Conteúdo saudável e muito engajamento feminino.', verified:false },
    { id:6, name:'Juliana P.',    avatar:'🌸', bg:'rgba(255,100,150,.15)', niche:['Lifestyle'],        location:'Rio de Janeiro',modality:'Híbrido',     followers:'65k', revenue:'R$7k–12k',  rating:4.9, bio:'Lifestyle creator com foco em viagens e bem-estar. Parceria com diversas marcas internacionais.', verified:false },
    { id:7, name:'Aline T.',      avatar:'🦋', bg:'rgba(0,200,200,.15)',   niche:['Moda','Arte'],      location:'Minas Gerais', modality:'Home Office', followers:'18k', revenue:'R$2k–3k',   rating:4.3, bio:'Fotógrafa e criadora de arte visual. Perfil estético com crescimento consistente.', verified:false },
    { id:8, name:'Bianca M.',     avatar:'✨', bg:'rgba(255,180,0,.15)',   niche:['Fitness'],          location:'São Paulo',    modality:'Presencial',  followers:'200k',revenue:'R$30k+',    rating:5.0, bio:'Top creator fitness do Brasil. Mais de 200k seguidores e faturamento consolidado. Busco agência premium.', verified:false },
  ];

  const agencies = [
    { id:1, name:'Prime Agency',    avatar:'🏢', bg:'rgba(255,108,47,.15)',  niche:['Fitness','Lifestyle'], location:'São Paulo',    modality:'Home Office', models:8,  plan:'Pro',        rating:4.8, bio:'Especialistas em crescimento orgânico e chatters. Gerenciamos 8 modelos com resultados comprovados.', verified:true },
    { id:2, name:'Elite Models BR', avatar:'⭐', bg:'rgba(255,215,0,.15)',   niche:['Moda','Lifestyle'],  location:'Rio de Janeiro',modality:'Híbrido',     models:22, plan:'Enterprise', rating:4.9, bio:'A maior agência do RJ. 22 modelos gerenciadas, equipe de 15 profissionais e histórico de resultados.', verified:true },
    { id:3, name:'TopFans Agency',  avatar:'🚀', bg:'rgba(0,175,240,.15)',   niche:['Gaming','Arte'],     location:'São Paulo',    modality:'Home Office', models:5,  plan:'Pro',        rating:4.6, bio:'Agência jovem especializada em nichos específicos. Foco em tráfego pago e PPV estratégico.', verified:true },
    { id:4, name:'GrowthOF',        avatar:'📈', bg:'rgba(68,204,136,.15)', niche:['Fitness'],           location:'Minas Gerais', modality:'Presencial',  models:3,  plan:'Basic',      rating:4.2, bio:'Agência nova com foco em modelos fitness de Minas Gerais. Equipe local e suporte presencial.', verified:false },
    { id:5, name:'ContentPro BR',   avatar:'💼', bg:'rgba(180,120,255,.15)',niche:['Lifestyle','Moda'],  location:'São Paulo',    modality:'Híbrido',     models:12, plan:'Pro',        rating:4.7, bio:'Gestão completa de conteúdo com equipe criativa. Produção, edição e distribuição em todas as plataformas.', verified:true },
    { id:6, name:'VaultAgency',     avatar:'🔒', bg:'rgba(100,150,255,.15)',niche:['Arte','Música'],     location:'Rio de Janeiro',modality:'Home Office', models:7,  plan:'Pro',        rating:4.5, bio:'Especialistas em criadores de nicho artístico. Contratos transparentes e sem cláusulas abusivas.', verified:true },
  ];

  // ─── STATE ───────────────────────────────────────────────
  let currentView = 'models';
  const activeFilters = { niche:[], location:[], verified:[] };

  // ─── VIEW ────────────────────────────────────────────────
  function setView(view) {
    currentView = view;
    document.getElementById('btnModels').className   = 'view-btn' + (view==='models'   ? ' active-agency' : '');
    document.getElementById('btnAgencies').className = 'view-btn' + (view==='agencies' ? ' active-agency' : '');
    document.getElementById('verifiedFilter').style.display = view==='agencies' ? 'block' : 'none';
    document.getElementById('nicheFilter').style.display    = 'block';
    document.getElementById('resultsTitle').textContent = view==='models' ? 'Modelos disponíveis' : 'Agências verificadas';
    clearFilters();
  }

  // ─── FILTERS ─────────────────────────────────────────────
  function toggleFilter(el, type, value) {
    const isActive = el.classList.contains('active');
    if (isActive) {
      el.classList.remove('active','orange');
      activeFilters[type] = activeFilters[type].filter(v => v !== value);
    } else {
      el.classList.add('active');
      if (type === 'verified') el.classList.add('orange');
      activeFilters[type].push(value);
    }
    applyFilters();
  }

  function clearFilters() {
    activeFilters.niche = []; activeFilters.location = []; activeFilters.verified = [];
    document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active','orange'));
    document.querySelectorAll('input[name="modality"]')[0].checked = true;
    document.getElementById('searchInput').value = '';
    applyFilters();
  }

  function applyFilters() {
    const query    = document.getElementById('searchInput').value.toLowerCase();
    const modality = document.querySelector('input[name="modality"]:checked')?.value || '';
    const data     = currentView === 'models' ? models : agencies;

    let filtered = data.filter(item => {
      const matchQuery    = !query || item.name.toLowerCase().includes(query) || item.bio.toLowerCase().includes(query) || item.niche.some(n => n.toLowerCase().includes(query));
      const matchNiche    = !activeFilters.niche.length    || activeFilters.niche.some(n => item.niche.includes(n));
      const matchLocation = !activeFilters.location.length || activeFilters.location.includes(item.location);
      const matchModality = !modality || item.modality === modality;
      const matchVerified = !activeFilters.verified.length || item.verified;
      return matchQuery && matchNiche && matchLocation && matchModality && matchVerified;
    });

    document.getElementById('viewCount').textContent = `${filtered.length} ${currentView==='models'?'modelos':'agências'} encontradas`;
    renderCards(filtered);
  }

  // ─── RENDER ──────────────────────────────────────────────
  function renderCards(data) {
    const grid = document.getElementById('cardsGrid');
    if (!data.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🔍</div><h3>Nenhum resultado</h3><p>Tente ajustar os filtros para encontrar mais opções.</p></div>`;
      return;
    }
    grid.innerHTML = currentView === 'models' ? data.map(renderModelCard).join('') : data.map(renderAgencyCard).join('');
  }

  function stars(r) {
    const full = Math.floor(r); const half = r % 1 >= .5;
    return '★'.repeat(full) + (half?'½':'') + '☆'.repeat(5-full-(half?1:0));
  }

  function renderModelCard(m) {
    return `
    <div class="model-card blue-card" onclick="openProfile('model',${m.id})">
      <div class="card-header">
        <div class="card-avatar" style="background:${m.bg}">${m.avatar}</div>
        <div>
          <div class="card-name">${m.name}</div>
          <div class="card-sub">📍 ${m.location} · ${m.modality}</div>
        </div>
      </div>
      <div class="card-badges">
        ${m.niche.map(n=>`<span class="badge badge-blue">${n}</span>`).join('')}
        <span class="badge badge-gray">🏠 ${m.modality}</span>
      </div>
      <div class="card-stats">
        <div class="card-stat">
          <div class="card-stat-value" style="color:var(--blue)">${m.followers}</div>
          <div class="card-stat-label">Seguidores</div>
        </div>
        <div class="card-stat">
          <div class="card-stat-value" style="color:var(--yellow)">${stars(m.rating)}</div>
          <div class="card-stat-label">Avaliação</div>
        </div>
      </div>
      </div>
      <p class="card-bio">${m.bio}</p>
      <div class="card-footer">
        <button class="btn-contact primary" onclick="event.stopPropagation();startChat('${m.name}','model')">💬 Iniciar Chat</button>
        <button class="btn-contact secondary" onclick="event.stopPropagation();openProfile('model',${m.id})">Ver Perfil</button>
      </div>
    </div>`;
  }

  function renderAgencyCard(a) {
    return `
    <div class="model-card orange-card" onclick="openProfile('agency',${a.id})">
      ${a.verified ? '<div class="verified-stamp">✓ Verificada</div>' : ''}
      <div class="card-header">
        <div class="card-avatar" style="background:${a.bg}">${a.avatar}</div>
        <div>
          <div class="card-name">${a.name}</div>
          <div class="card-sub">📍 ${a.location} · ${a.modality}</div>
        </div>
      </div>
      <div class="card-badges">
        ${a.niche.map(n=>`<span class="badge badge-orange">${n}</span>`).join('')}
        <span class="badge ${a.plan==='Enterprise'?'badge-blue':a.plan==='Pro'?'badge-orange':'badge-gray'}">${a.plan}</span>
      </div>
      <div class="card-stats">
        <div class="card-stat">
          <div class="card-stat-value" style="color:var(--orange)">${a.models}</div>
          <div class="card-stat-label">Modelos</div>
        </div>
        <div class="card-stat">
          <div class="card-stat-value" style="color:${a.verified?'var(--green)':'var(--gray)'}">${a.verified?'✓ Sim':'Pendente'}</div>
          <div class="card-stat-label">Verificada</div>
        </div>
      </div>
      <p class="card-bio">${a.bio}</p>
      <div class="card-footer">
        <button class="btn-contact primary" onclick="event.stopPropagation();startChat('${a.name}','agency')" style="background:linear-gradient(135deg,var(--orange),#CC4400)">💬 Iniciar Chat</button>
        <button class="btn-contact secondary" onclick="event.stopPropagation();openProfile('agency',${a.id})">Ver Perfil</button>
      </div>
    </div>`;
  }

  function openProfile(type, id) {
    window.location.href = `onlyconecta-perfil.html?type=${type}&id=${id}`;
  }

  function startChat(name, type) {
    const params = new URLSearchParams({ chat: name, type });
    window.location.href = 'onlyconecta-dashboard.html?' + params.toString();
    showToast(`Abrindo chat com ${name}...`);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = '✅ ' + msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ─── INIT ────────────────────────────────────────────────
  const urlView = new URLSearchParams(window.location.search).get('view');
  if (urlView === 'agencies') setView('agencies');
  else { setView('models'); }
</script>
</body>
</html>
