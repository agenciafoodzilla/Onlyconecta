<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --blue:#00AFF0; --orange:#FF6C2F; --dark:#080C12; --dark2:#0F1520; --dark3:#162030; --white:#F4F8FF; --gray:#8899AA; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark); color:var(--white); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px; overflow:hidden; }

  .bg-glow-1 { position:fixed; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle,rgba(0,175,240,0.08),transparent 70%); top:-200px; left:-200px; pointer-events:none; }
  .bg-glow-2 { position:fixed; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle,rgba(255,108,47,0.07),transparent 70%); bottom:-150px; right:-150px; pointer-events:none; }

  .logo { display:flex; align-items:center; gap:10px; text-decoration:none; margin-bottom:48px; }
  .logo-text { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; }
  .logo-text span:first-child { color:var(--blue); }
  .logo-text span:last-child { color:var(--orange); }

  .error-code {
    font-family:'Syne',sans-serif; font-size:120px; font-weight:800; line-height:1;
    background:linear-gradient(135deg,var(--blue),var(--orange));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    margin-bottom:8px; animation:float 4s ease-in-out infinite;
  }

  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

  .error-icon { font-size:48px; margin-bottom:16px; }

  h1 { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; margin-bottom:12px; }
  p { color:var(--gray); font-size:16px; max-width:400px; line-height:1.6; margin-bottom:36px; }

  .btn-group { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }

  .btn-primary { background:linear-gradient(135deg,var(--orange),#CC4400); color:white; padding:14px 28px; border-radius:10px; text-decoration:none; font-size:15px; font-weight:600; transition:opacity .2s,transform .2s; box-shadow:0 6px 24px rgba(255,108,47,0.25); }
  .btn-primary:hover { opacity:.88; transform:translateY(-2px); }

  .btn-secondary { background:rgba(0,175,240,0.1); color:var(--blue); padding:14px 28px; border-radius:10px; text-decoration:none; font-size:15px; font-weight:500; border:1px solid rgba(0,175,240,0.25); transition:background .2s,transform .2s; }
  .btn-secondary:hover { background:rgba(0,175,240,0.18); transform:translateY(-2px); }

  .quick-links { margin-top:48px; display:flex; gap:24px; flex-wrap:wrap; justify-content:center; }
  .quick-link { color:var(--gray); text-decoration:none; font-size:13px; transition:color .2s; }
  .quick-link:hover { color:var(--white); }
</style>
</head>
<body>
  <div class="bg-glow-1"></div>

    <div class="logo-text"><span>Only</span><span>Conecta</span></div>
  </a>

  <div class="error-code">404</div>
  <div class="error-icon">🔍</div>
  <h1>Página não encontrada</h1>
  <p>Parece que o link que você seguiu está quebrado ou a página foi removida. Não se preocupe, acontece!</p>

  <div class="btn-group">
    <a href="onlyconecta.html" class="btn-primary">← Voltar ao início</a>
    <a href="onlyconecta-contato.html" class="btn-secondary">Reportar problema</a>

</body>
</html>
